services:
  - type: web
    name: compplan
    runtime: node
    nodeVersion: "20"
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: compplan-db
          property: connectionString

databases:
  - name: compplan-db
    plan: free
    databaseName: compplan
    user: compplan_user
