services:
  - type: web
    name: compplan
    runtime: node
    nodeVersion: "20"
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/compplan.sqlite
    disk:
      name: compplan-data
      mountPath: /data
      sizeGB: 1
