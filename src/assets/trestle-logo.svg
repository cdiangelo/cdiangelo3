<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img">
<title>Trestle</title>
<!-- T overlay -->
<path d="M2 8h96v22H67v62H33V30H2z" fill="#2E6B61" opacity=".55"/>
<!-- X-bracing tier 1 (y=30→65) -->
<line x1="2" y1="30" x2="33" y2="65" stroke="#4A9B8E" stroke-width="2.5"/>
<line x1="33" y1="30" x2="2" y2="65" stroke="#4A9B8E" stroke-width="2.5"/>
<line x1="33" y1="30" x2="67" y2="65" stroke="#4A9B8E" stroke-width="2.5"/>
<line x1="67" y1="30" x2="33" y2="65" stroke="#4A9B8E" stroke-width="2.5"/>
<line x1="67" y1="30" x2="98" y2="65" stroke="#4A9B8E" stroke-width="2.5"/>
<line x1="98" y1="30" x2="67" y2="65" stroke="#4A9B8E" stroke-width="2.5"/>
<!-- X-bracing tier 2 (y=65→92) -->
<line x1="2" y1="65" x2="33" y2="92" stroke="#4A9B8E" stroke-width="2.5"/>
<line x1="33" y1="65" x2="2" y2="92" stroke="#4A9B8E" stroke-width="2.5"/>
<line x1="33" y1="65" x2="67" y2="92" stroke="#4A9B8E" stroke-width="2.5"/>
<line x1="67" y1="65" x2="33" y2="92" stroke="#4A9B8E" stroke-width="2.5"/>
<line x1="67" y1="65" x2="98" y2="92" stroke="#4A9B8E" stroke-width="2.5"/>
<line x1="98" y1="65" x2="67" y2="92" stroke="#4A9B8E" stroke-width="2.5"/>
<!-- Tier tie -->
<line x1="2" y1="65" x2="98" y2="65" stroke="#4A9B8E" stroke-width="3"/>
<!-- Posts -->
<line x1="2" y1="30" x2="2" y2="92" stroke="#4A9B8E" stroke-width="3.5"/>
<line x1="33" y1="30" x2="33" y2="92" stroke="#4A9B8E" stroke-width="3.5"/>
<line x1="67" y1="30" x2="67" y2="92" stroke="#4A9B8E" stroke-width="3.5"/>
<line x1="98" y1="30" x2="98" y2="92" stroke="#4A9B8E" stroke-width="3.5"/>
<!-- Bottom rail -->
<line x1="2" y1="92" x2="98" y2="92" stroke="#4A9B8E" stroke-width="4.5"/>
<!-- Valley landmasses -->
<path d="M0 72Q8 78 14 84Q22 88 33 92L2 92Z" fill="#4A9B8E"/>
<path d="M100 72Q92 78 86 84Q78 88 67 92L98 92Z" fill="#4A9B8E"/>
<!-- Truss deck -->
<polyline points="2,30 17,8 33,30 50,8 67,30 83,8 98,30" fill="none" stroke="#4A9B8E" stroke-width="2.8" stroke-linejoin="round"/>
<line x1="2" y1="8" x2="98" y2="8" stroke="#4A9B8E" stroke-width="5"/>
<line x1="2" y1="30" x2="98" y2="30" stroke="#4A9B8E" stroke-width="4"/>
</svg>
