<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" role="img">
<title>Trestle</title>
<!-- Frame -->
<rect x="3" y="3" width="94" height="114" rx="8" fill="#3d3229" stroke="#2a2118" stroke-width="2.5"/>
<!-- Beige body -->
<rect x="8" y="8" width="84" height="80" rx="4" fill="#d4c8b8"/>
<!-- Valley trapezoid -->
<path d="M8 88h84L72 108H28Z" fill="#c4b5a0"/>
<!-- Valley landmasses -->
<path d="M28 108L8 88H28Z" fill="#8b7355"/>
<path d="M72 108L92 88H72Z" fill="#8b7355"/>
<!-- Lattice diagonals -->
<line x1="8" y1="8" x2="50" y2="48" stroke="#5c4a3a" stroke-width="1.2" opacity=".6"/>
<line x1="92" y1="8" x2="50" y2="48" stroke="#5c4a3a" stroke-width="1.2" opacity=".6"/>
<line x1="8" y1="48" x2="50" y2="8" stroke="#5c4a3a" stroke-width="1.2" opacity=".6"/>
<line x1="92" y1="48" x2="50" y2="8" stroke="#5c4a3a" stroke-width="1.2" opacity=".6"/>
<line x1="8" y1="48" x2="50" y2="88" stroke="#5c4a3a" stroke-width="1.2" opacity=".6"/>
<line x1="92" y1="48" x2="50" y2="88" stroke="#5c4a3a" stroke-width="1.2" opacity=".6"/>
<line x1="8" y1="88" x2="50" y2="48" stroke="#5c4a3a" stroke-width="1.2" opacity=".6"/>
<line x1="92" y1="88" x2="50" y2="48" stroke="#5c4a3a" stroke-width="1.2" opacity=".6"/>
<!-- Horizontals -->
<line x1="8" y1="8" x2="92" y2="8" stroke="#5c4a3a" stroke-width="1.8"/>
<line x1="8" y1="48" x2="92" y2="48" stroke="#5c4a3a" stroke-width="1.5"/>
<line x1="8" y1="88" x2="92" y2="88" stroke="#5c4a3a" stroke-width="1.8"/>
<!-- Verticals -->
<line x1="8" y1="8" x2="8" y2="88" stroke="#5c4a3a" stroke-width="1.8"/>
<line x1="50" y1="8" x2="50" y2="88" stroke="#5c4a3a" stroke-width="1.5"/>
<line x1="92" y1="8" x2="92" y2="88" stroke="#5c4a3a" stroke-width="1.8"/>
<!-- Valley struts -->
<line x1="28" y1="88" x2="50" y2="108" stroke="#5c4a3a" stroke-width="1.2"/>
<line x1="72" y1="88" x2="50" y2="108" stroke="#5c4a3a" stroke-width="1.2"/>
<line x1="50" y1="88" x2="50" y2="108" stroke="#5c4a3a" stroke-width="1.2"/>
<circle cx="50" cy="108" r="2" fill="#5c4a3a"/>
</svg>
