<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Font Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Merriweather:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,700;1,400&family=Crimson+Text:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600;700&family=DM+Sans:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@400;600;700&family=Sora:wght@400;600;700&family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&family=Fira+Code:wght@400;600;700&family=Source+Code+Pro:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Spectral:ital,wght@0,400;0,700;1,400&family=Nunito:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@400;600;700&family=Raleway:ital,wght@0,400;0,700;1,400&family=Outfit:wght@400;600;700&family=Caveat:wght@400;600;700&family=Kalam:wght@400;700&family=Dancing+Script:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f1923; color: #d0d8e0; font-family: Inter, sans-serif; padding: 32px 48px; }
h1 { font-size: 1.4rem; color: #5b9a6a; margin-bottom: 8px; font-weight: 600; }
.subtitle { font-size: .8rem; color: #6a7a88; margin-bottom: 32px; }
.category { font-size: .7rem; text-transform: uppercase; letter-spacing: .12em; color: #5b9a6a; font-weight: 700; margin: 28px 0 12px; padding-bottom: 6px; border-bottom: 1px solid #1e2e3a; }
.font-card { background: #141f2b; border: 1px solid #1e2e3a; border-radius: 10px; padding: 20px 24px; margin-bottom: 12px; }
.font-name { font-size: .75rem; color: #5b9a6a; font-weight: 600; letter-spacing: .04em; margin-bottom: 12px; font-family: Inter, sans-serif; }
.sample-row { display: flex; align-items: baseline; gap: 24px; margin-bottom: 6px; flex-wrap: wrap; }
.size-label { font-size: .6rem; color: #4a5a68; width: 36px; flex-shrink: 0; font-family: Inter, sans-serif; text-align: right; }
.sample-text { color: #d0d8e0; line-height: 1.3; }
.weight-row { display: flex; gap: 32px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #1a2836; flex-wrap: wrap; }
.weight-example { font-size: .68rem; color: #4a5a68; font-family: Inter, sans-serif; }
.weight-example span { color: #a0b0be; }
</style>
</head>
<body>

<h1>Available Fonts</h1>
<p class="subtitle">23 Google Fonts loaded in the app — shown at 12px, 18px, 28px, and 40px</p>

<script>
const fonts = [
  { category: 'Serif', items: [
    { name: 'Playfair Display', family: "'Playfair Display', serif" },
    { name: 'Merriweather', family: "'Merriweather', serif" },
    { name: 'Lora', family: "'Lora', serif" },
    { name: 'Crimson Text', family: "'Crimson Text', serif" },
    { name: 'Cormorant Garamond', family: "'Cormorant Garamond', serif" },
    { name: 'Libre Baskerville', family: "'Libre Baskerville', serif" },
    { name: 'Spectral', family: "'Spectral', serif" },
  ]},
  { category: 'Sans-Serif', items: [
    { name: 'Inter', family: "'Inter', sans-serif" },
    { name: 'DM Sans', family: "'DM Sans', sans-serif" },
    { name: 'Space Grotesk', family: "'Space Grotesk', sans-serif" },
    { name: 'Sora', family: "'Sora', sans-serif" },
    { name: 'Nunito', family: "'Nunito', sans-serif" },
    { name: 'Quicksand', family: "'Quicksand', sans-serif" },
    { name: 'Raleway', family: "'Raleway', sans-serif" },
    { name: 'Outfit', family: "'Outfit', sans-serif" },
  ]},
  { category: 'Monospace', items: [
    { name: 'JetBrains Mono', family: "'JetBrains Mono', monospace" },
    { name: 'Fira Code', family: "'Fira Code', monospace" },
    { name: 'Source Code Pro', family: "'Source Code Pro', monospace" },
    { name: 'IBM Plex Mono', family: "'IBM Plex Mono', monospace" },
  ]},
  { category: 'Handwriting / Display', items: [
    { name: 'Caveat', family: "'Caveat', cursive" },
    { name: 'Kalam', family: "'Kalam', cursive" },
    { name: 'Dancing Script', family: "'Dancing Script', cursive" },
    { name: 'Pacifico', family: "'Pacifico', cursive" },
  ]},
];

const sizes = [12, 18, 28, 40];
const sampleText = 'Meridian Planning Platform 0123456789';

fonts.forEach(group => {
  document.write(`<div class="category">${group.category}</div>`);
  group.items.forEach(f => {
    let rows = sizes.map(s =>
      `<div class="sample-row">
        <span class="size-label">${s}px</span>
        <span class="sample-text" style="font-family:${f.family};font-size:${s}px">${sampleText}</span>
      </div>`
    ).join('');
    rows += `<div class="weight-row">
      <div class="weight-example">Regular: <span style="font-family:${f.family};font-size:14px;font-weight:400">${f.name}</span></div>
      <div class="weight-example">Bold: <span style="font-family:${f.family};font-size:14px;font-weight:700">${f.name}</span></div>
      <div class="weight-example">Italic: <span style="font-family:${f.family};font-size:14px;font-style:italic">${f.name}</span></div>
    </div>`;
    document.write(`<div class="font-card"><div class="font-name">${f.name}</div>${rows}</div>`);
  });
});
</script>

</body>
</html>
